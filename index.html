<body>
  <!-- Redirect /conferencia → evento LATIR antes de que cargue React -->
  <script>
    if (window.location.pathname === '/conferencia') {
      window.location.replace('https://rotarylatir.org/#/eventos/2038324a-0e04-497c-9328-fbaeb9ce2992');
    }
    // REGLA DE REDIRECCIÓN SAAS (Prioridad Absoluta)
    if (window.location.hostname === 'clubplatform.org' || window.location.hostname === 'www.clubplatform.org') {
      if (window.location.pathname === '/' || window.location.pathname === '') {
        window.location.replace('https://app.clubplatform.org/');
      }
    }
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
